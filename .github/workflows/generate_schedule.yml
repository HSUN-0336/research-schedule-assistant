name: Generate Research Schedule

on:
  workflow_dispatch:
  push:
    paths:
      - "projects/*.yml"
      - "scripts/generate_schedule.py"

permissions:
  contents: write

jobs:
  generate-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Generate schedules
        run: |
          for file in projects/*.yml; do
            python scripts/generate_schedule.py "$file"
          done

      - name: Commit updated schedules
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add schedules/*.md
          git diff --cached --quiet || git commit -m "Update generated research schedules"
          git push
